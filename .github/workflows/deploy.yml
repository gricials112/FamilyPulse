name: Deploy

on:
  workflow_run:
    workflows: ["CI"]
    branches: [main]
    types:
      - completed

jobs:
  deploy:
    runs-on: ubuntu-latest
    if: ${{ github.event.workflow_run.conclusion == 'success' }}
    steps:
      - uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version-file: backend/go.mod
          cache-dependency-path: backend/go.sum

      - name: Verify backend before deploy
        run: |
          cd backend
          make coverage
          make build

      - name: Deploy via SSH
        if: false
        env:
          SSH_HOST: jiaan.online
          SSH_USER: deploy
          SSH_KEY: ${{ secrets.SSH_PRIVATE_KEY }}
        run: |
          echo "Configure SSH secrets, .env, ssl, then run ./deploy.sh from a trusted runner."
